# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the exact Python version
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.12'
          cache: 'pip' # Caches dependencies to make workflows run faster

      # 3. Install the package, pytest, and ruff
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas
          python -m pip install -e .

      # 4. Run Ruff Linting and Formatting checks
      # This uses the rules already defined in your pyproject.toml
      - name: Run Ruff Check & Format
        run: |
          python -m pip install ruff
          python -m ruff check .
          python -m ruff format . --check

      # 5. Run test suite via pytest
      - name: Run tests with pytest
        run: |
          python -m pytest -v
